{% extends "base.html" %}
{% block body %}
<h1>Job <code style="font-size:0.9em">{{ job_id }}</code></h1>
<p><a href="/jobs">← Back to jobs</a></p>

<div id="summary" class="panel glass" style="font-size:0.9rem;line-height:1.6;"></div>

<div class="row" style="margin:0.75rem 0;gap:0.5rem;">
  <a class="btn" id="btn-dl" href="/api/jobs/{{ job_id }}/download" style="display:none;">Download ZIP</a>
  <button type="button" class="btn secondary" id="btn-cancel">Cancel</button>
  <button type="button" class="btn secondary" id="btn-retry" style="display:none;">Retry</button>
</div>

<h2>Log</h2>
<div class="row" style="margin-bottom:0.5rem;">
  <label class="checkbox-row" style="margin:0;">
    <input type="checkbox" id="autoscroll" checked />
    Auto-scroll to bottom
  </label>
  <button type="button" class="btn secondary" id="btn-bottom">Jump to bottom</button>
</div>
<div class="log-box glass" id="log"></div>

<script>
const jobId = "{{ job_id }}";
const logEl = document.getElementById('log');
const summary = document.getElementById('summary');
const autoscroll = document.getElementById('autoscroll');
let userScrolled = false;

logEl.addEventListener('scroll', () => {
  const nearBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 80;
  userScrolled = !nearBottom;
});

document.getElementById('btn-bottom').onclick = () => {
  logEl.scrollTop = logEl.scrollHeight;
  userScrolled = false;
};

async function refresh() {
  const [jr, lr] = await Promise.all([
    fetch('/api/jobs/' + jobId).then(r => r.json()),
    fetch('/api/jobs/' + jobId + '/log?tail=4000').then(r => r.json()),
  ]);
  const statusPretty = jr.status === 'skipped' ? 'Skipped' : (jr.status || '');
  summary.innerHTML =
    '<strong>Title:</strong> ' + (jr.title || '') + '<br/>' +
    '<strong>Artist:</strong> ' + (jr.artist || '—') + '<br/>' +
    '<strong>Source:</strong> ' + (jr.source || '') + '<br/>' +
    '<strong>Status:</strong> ' + statusPretty + ' &nbsp; <strong>Stage:</strong> ' + (jr.stage || '') + '<br/>' +
    (jr.error ? '<strong>Error:</strong> ' + jr.error + '<br/>' : '');

  const dl = document.getElementById('btn-dl');
  dl.style.display = jr.status === 'completed' ? 'inline-flex' : 'none';

  document.getElementById('btn-cancel').style.display =
    (jr.status === 'queued' || jr.status === 'running') ? 'inline-flex' : 'none';
  document.getElementById('btn-retry').style.display =
    (jr.status === 'failed' || jr.status === 'completed' || jr.status === 'skipped') ? 'inline-flex' : 'none';

  logEl.textContent = lr.lines || '';
  if (autoscroll.checked && !userScrolled) {
    logEl.scrollTop = logEl.scrollHeight;
  }
}

document.getElementById('btn-cancel').onclick = async () => {
  await fetch('/api/jobs/' + jobId + '/cancel', { method: 'POST' });
  refresh();
};
document.getElementById('btn-retry').onclick = async () => {
  await fetch('/api/jobs/' + jobId + '/retry', { method: 'POST' });
  refresh();
};

refresh();
setInterval(refresh, 1500);
</script>
{% endblock %}
