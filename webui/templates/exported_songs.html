{% extends "base.html" %}
{% block body %}
<h1>Exported Songs</h1>
<div class="row panel glass" style="margin-bottom:1rem;padding:0.85rem 1rem;">
  <button type="button" class="btn secondary" id="btn-refresh">Refresh list</button>
  <button type="button" class="btn secondary" id="btn-reprocess-all">Reprocess all songs</button>
  <input type="text" id="song-search" placeholder="Search songs..." style="max-width:22rem;" />
  <span id="count" style="color:var(--muted);font-size:0.9rem;align-self:center;">0 songs</span>
</div>
<div id="global-msg" class="flash"></div>

<div class="panel glass">
  <table class="data" id="songs-table" style="table-layout:fixed;">
    <thead>
      <tr>
        <th>Artist</th>
        <th>Title</th>
        <th>Type</th>
        <th>Folder</th>
        <th>Files</th>
        <th></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const tbody = document.querySelector('#songs-table tbody');
const globalMsg = document.getElementById('global-msg');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('song-search');
const reprocessAllBtn = document.getElementById('btn-reprocess-all');
let allSongs = [];

function escHtml(v) {
  return String(v || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function loadSongs() {
  globalMsg.textContent = '';
  globalMsg.className = 'flash';
  try {
    const r = await fetch('/api/exported-songs');
    const j = await r.json();
    if (!r.ok) throw new Error(j.detail || r.statusText || 'Could not load songs');
    allSongs = j.songs || [];
    renderSongs();
  } catch (err) {
    globalMsg.textContent = err.message || String(err);
    globalMsg.className = 'flash err';
  }
}

function songMatchesQuery(x, q) {
  if (!q) return true;
  const hay = [
    x.artist || '',
    x.title || '',
    x.name || '',
    x.type || '',
    x.path || '',
  ].join(' ').toLowerCase();
  return hay.indexOf(q) >= 0;
}

function renderSongs() {
  const q = String((searchEl && searchEl.value) || '').trim().toLowerCase();
  const songs = allSongs.filter((x) => songMatchesQuery(x, q));
  countEl.textContent = songs.length + ' song' + (songs.length === 1 ? '' : 's');
  tbody.innerHTML = songs.map(function (x) {
      const canReprocess = x.reprocess_mode === 'youtube' || x.reprocess_mode === 'audio';
      const action = canReprocess
        ? '<button type="button" class="btn secondary" data-act="reprocess" data-path="' + escHtml(x.path || '') + '" style="white-space:normal;">' +
          (x.reprocess_mode === 'youtube' ? 'Redownload + Reprocess' : 'Reprocess Audio') + '</button>'
        : '<span style="color:var(--muted)">—</span>';
      return '<tr>' +
        '<td>' + escHtml(x.artist || '—') + '</td>' +
        '<td>' + escHtml(x.title || x.name || '—') + '</td>' +
        '<td>' + escHtml(x.type || '—') + '</td>' +
        '<td style="overflow-wrap:anywhere;word-break:break-word;white-space:normal" title="' + escHtml(x.path || '') + '">' + escHtml(x.path || '') + '</td>' +
        '<td>' + escHtml(x.file_count ?? 0) + '</td>' +
        '<td style="white-space:normal;overflow-wrap:anywhere;word-break:break-word">' + action + '</td>' +
        '</tr>';
    }).join('') || '<tr><td colspan="6" style="color:var(--muted)">No exported songs found.</td></tr>';
}

document.getElementById('btn-refresh').onclick = loadSongs;
if (reprocessAllBtn) {
  reprocessAllBtn.addEventListener('click', async () => {
    const ok = window.confirm('Reprocess ALL exported songs? This will queue new jobs for every reprocessable song.');
    if (!ok) return;
    globalMsg.textContent = '';
    globalMsg.className = 'flash';
    reprocessAllBtn.disabled = true;
    const originalLabel = reprocessAllBtn.textContent;
    reprocessAllBtn.textContent = 'Queuing...';
    try {
      const r = await fetch('/api/exported-songs/reprocess-all', { method: 'POST' });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(j.detail || r.statusText || 'Bulk queue failed');
      globalMsg.textContent =
        'Queued ' + (j.queued ?? 0) + ' song(s). Skipped ' + (j.skipped ?? 0) + ', failed ' + (j.failed ?? 0) + '.';
      globalMsg.className = 'flash ok';
    } catch (err) {
      globalMsg.textContent = err.message || String(err);
      globalMsg.className = 'flash err';
    } finally {
      reprocessAllBtn.disabled = false;
      reprocessAllBtn.textContent = originalLabel;
    }
  });
}
if (searchEl) {
  searchEl.addEventListener('input', renderSongs);
}
tbody.addEventListener('click', async (ev) => {
  const b = ev.target.closest('button[data-act="reprocess"]');
  if (!b) return;
  const p = b.getAttribute('data-path');
  if (!p) return;
  globalMsg.textContent = '';
  globalMsg.className = 'flash';
  try {
    const r = await fetch('/api/exported-songs/reprocess', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: p }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(j.detail || r.statusText || 'Queue failed');
    const modeTxt = j.mode === 'youtube' ? 'Redownload + reprocess queued.' : 'Audio reprocess queued.';
    globalMsg.textContent = modeTxt;
    globalMsg.className = 'flash ok';
  } catch (err) {
    globalMsg.textContent = err.message || String(err);
    globalMsg.className = 'flash err';
  }
});

loadSongs();
setInterval(loadSongs, 5000);
</script>
{% endblock %}
